# Untitled Duck Mod server defaults for Pummelchen.
# Tamed waterfowl stay put instead of following players into mining/building work.
[duck]
	duck_spawn_weight = 6
	duck_min_group_size = 2
	duck_max_group_size = 4
	duck_fishing_change = 0.5
	duck_tamed_no_follow = true
	duck_baby_random_size = true

[goose]
	goose_spawn_weight = 4
	goose_min_group_size = 2
	goose_max_group_size = 4
	goose_tamed_no_follow = true
	goose_baby_random_size = true

[common]
	enable_force_eat = false
	force_eat_random_min_tick = 500
	force_eat_random_max_tick = 1000
	food_healing_value = 0.5

[intimidation]
	intimidation_blacklist = ["modid:test"]
