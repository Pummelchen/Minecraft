# Public HTTP on port 7788 serves static release files.  The Swift API is kept
# on localhost and is reached only through these explicit proxy locations.
# HTTP/3/QUIC should be enabled at the TLS edge when a certificate/domain is
# available; keep the Swift service private on 127.0.0.1:8787.

# Rate-limit zone for client-log upload endpoints.
# 10 requests/second per client IP with a burst of 20.
limit_req_zone $binary_remote_addr zone=client_log_upload:10m rate=10r/s;

upstream pummelchen_swift_api {
    server 127.0.0.1:8787;
    keepalive 32;
}

server {
    listen 7788 default_server;
    listen [::]:7788 default_server;
    server_name _;

    root /var/minecraft_mods/site/public;
    index index.html;

    access_log /var/log/nginx/pummelchen_access.log;
    error_log /var/log/nginx/pummelchen_error.log;

    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy no-referrer-when-downgrade always;
    add_header X-Pummelchen-Transport-Target http3_quic_edge always;

    location / {
        try_files $uri $uri/ =404;
    }

    location /downloads/ {
        default_type application/octet-stream;
        try_files $uri =404;
    }

    location ^~ /api/v1/ {
        client_max_body_size 512k;
        proxy_pass http://pummelchen_swift_api;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_request_buffering on;
        proxy_connect_timeout 3s;
        proxy_send_timeout 35s;
        proxy_read_timeout 35s;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /h3/v1/control {
        client_max_body_size 64k;
        proxy_pass http://pummelchen_swift_api;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_connect_timeout 3s;
        proxy_send_timeout 35s;
        proxy_read_timeout 35s;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /client-logs/upload {
        limit_except POST { deny all; }
        limit_req zone=client_log_upload burst=20 nodelay;
        client_max_body_size 25m;
        client_body_timeout 35s;
        send_timeout 35s;
        proxy_pass http://127.0.0.1:7791;
        proxy_http_version 1.1;
        proxy_request_buffering on;
        proxy_connect_timeout 5s;
        proxy_send_timeout 35s;
        proxy_read_timeout 35s;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /client-logs/installer-event {
        limit_except POST { deny all; }
        limit_req zone=client_log_upload burst=20 nodelay;
        client_max_body_size 128k;
        client_body_timeout 10s;
        send_timeout 10s;
        proxy_pass http://127.0.0.1:7791;
        proxy_http_version 1.1;
        proxy_request_buffering on;
        proxy_connect_timeout 3s;
        proxy_send_timeout 10s;
        proxy_read_timeout 10s;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /client-logs/update-status {
        limit_except POST { deny all; }
        limit_req zone=client_log_upload burst=20 nodelay;
        client_max_body_size 64k;
        client_body_timeout 10s;
        send_timeout 10s;
        proxy_pass http://127.0.0.1:7791;
        proxy_http_version 1.1;
        proxy_request_buffering on;
        proxy_connect_timeout 5s;
        proxy_send_timeout 10s;
        proxy_read_timeout 10s;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
