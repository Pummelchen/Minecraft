server {
    listen 7788 default_server;
    listen [::]:7788 default_server;
    server_name _;

    root /var/minecraft_mods/site/public;
    index index.html;

    access_log /var/log/nginx/pummelchen_access.log;
    error_log /var/log/nginx/pummelchen_error.log;

    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy no-referrer-when-downgrade always;

    location / {
        try_files $uri $uri/ =404;
    }

    location /downloads/ {
        default_type application/octet-stream;
        try_files $uri =404;
    }

    location = /client-logs/upload {
        limit_except POST { deny all; }
        client_max_body_size 25m;
        client_body_timeout 35s;
        send_timeout 35s;
        proxy_pass http://127.0.0.1:7791;
        proxy_http_version 1.1;
        proxy_request_buffering on;
        proxy_connect_timeout 5s;
        proxy_send_timeout 35s;
        proxy_read_timeout 35s;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /client-logs/installer-event {
        limit_except POST { deny all; }
        client_max_body_size 128k;
        client_body_timeout 10s;
        send_timeout 10s;
        proxy_pass http://127.0.0.1:7791;
        proxy_http_version 1.1;
        proxy_request_buffering on;
        proxy_connect_timeout 3s;
        proxy_send_timeout 10s;
        proxy_read_timeout 10s;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
