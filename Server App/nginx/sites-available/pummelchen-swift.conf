server {
    listen 80 default_server;
    listen [::]:80 default_server;
    listen 7788 default_server;
    listen [::]:7788 default_server;
    server_name _;

    root /opt/pummelchen-swift/runtime/site/public;
    index index.html;

    access_log /var/log/nginx/pummelchen_swift_access.log;
    error_log /var/log/nginx/pummelchen_swift_error.log;

    location /api/ {
        client_max_body_size 256k;
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_read_timeout 35s;
        proxy_send_timeout 35s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "no-store, max-age=0" always;
    }

    location /h3/ {
        client_max_body_size 256k;
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_read_timeout 35s;
        proxy_send_timeout 35s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "no-store, max-age=0" always;
        add_header X-Pummelchen-Transport-Target "http3_quic_edge" always;
    }

    location /downloads/ {
        alias /opt/pummelchen-swift/runtime/site/public/downloads/;
        autoindex off;
        add_header Cache-Control "public, max-age=60";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;
    }

    location / {
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;
        try_files $uri $uri/ /index.html;
    }
}
