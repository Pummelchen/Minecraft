server {
    listen 80 default_server;
    listen [::]:80 default_server;
    listen 7788 default_server;
    listen [::]:7788 default_server;
    server_name _;

    root /opt/pummelchen-swift/runtime/site/public;
    index index.html;

    access_log /var/log/nginx/pummelchen_swift_access.log;
    error_log /var/log/nginx/pummelchen_swift_error.log;

    location /api/ {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /h3/ {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /downloads/ {
        alias /opt/pummelchen-swift/runtime/site/public/downloads/;
        autoindex off;
        add_header Cache-Control "public, max-age=60";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
