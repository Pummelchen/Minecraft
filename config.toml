# Pummelchen Server Configuration
# Single source of truth for all hardcoded values

[server]
# Minecraft version
minecraft_version = "26.1.2"
neoforge_version = "26.1.2.71"

# Server paths
server_key = "minecraft_26_1_2"
server_dir = "/var/minecraft_26.1.2"
project_dir = "/var/minecraft_mods"
release_root = "/var/minecraft_mods/releases"
public_downloads = "/var/minecraft_mods/site/public/downloads"
backup_dir = "/var/minecraft_mods/backups"
staging_root = "/var/minecraft_mods/.pipeline_staging"

# Network
server_host = "91.99.176.243"
server_port = 25565
rcon_port = 25575
web_port = 7788
live_stats_port = 7792
client_log_port = 7791

# Monitoring
prometheus_port = 9090
node_exporter_port = 9100
blackbox_exporter_port = 9115

[client]
# Client package
client_zip_name = "minecraft_26.1.2_client_macos_apple_silicon.zip"
mrpack_name = "pummelchen-server-26.1.2.mrpack"
dmg_name = "Pummelchen-Client-Installer.dmg"
installer_name = "install-pummelchen.command"

# Auto-updater
auto_update_interval = 300
installer_version = "1.2"

# Java
java_version = "25"
java_arch = "aarch64"
java_vendor = "temurin"

[paths]
# Database
db_path = "/var/minecraft_mods/data/minecraft_mods.sqlite"

# Directories
mod_acceptance_lab_root = "/var/minecraft_mods/mod_acceptance_lab"
headless_client_lab_root = "/var/minecraft_mods/headless_client_lab"
pummelchen_mods_dir = "/var/minecraft_mods/Pummelchen_Mods"
client_log_uploads = "/var/minecraft_mods/client_log_uploads"
downloads = "/var/minecraft_mods/downloads"
deploy_stage = "/var/minecraft_mods/deploy-stage"
test_sources = "/var/minecraft_mods/test_sources"

[limits]
# API rate limits
api_rate_limit = 10
api_rate_burst = 20

# Timeouts
api_timeout = 45
download_timeout = 120
boot_timeout = 900
client_upload_timeout = 35

# Cleanup
lab_keep_days = 2
rollback_keep_days = 2
log_keep_days = 14
crash_keep_days = 30
client_upload_keep_days = 30
upload_temp_max_age_hours = 1
temp_max_age_hours = 0

[compatibility]
game_versions = ["26.1.2", "26.1.1", "26.1"]
loaders = ["neoforge"]

[services]
# Systemd service names
minecraft_service = "pummelchen-minecraft.service"
live_stats_service = "pummelchen-live-stats.service"
live_stats_timer = "pummelchen-live-stats.timer"
client_log_receiver_service = "pummelchen-client-log-receiver.service"
minecraft_metrics_service = "pummelchen-minecraft-metrics.service"
tested_updates_service = "pummelchen-tested-updates.service"
tested_updates_timer = "pummelchen-tested-updates.timer"
acceptance_lab_cleanup_service = "pummelchen-acceptance-lab-cleanup.service"
acceptance_lab_cleanup_timer = "pummelchen-acceptance-lab-cleanup.timer"
headless_client_service = "pummelchen-headless-client.service"

[cron]
daily_update_schedule = "0 12 * * *"
status_site_schedule = "*/5 * * * *"

[urls]
# API endpoints
curseforge_api_base = "https://api.curse.tools/v1/cf"
modrinth_api_base = "https://api.modrinth.com/v2"
adoptium_api = "https://api.adoptium.net/v3/binary/latest/25/ga/mac/aarch64/jdk/hotspot/normal/eclipse?project=jdk"
headlessmc_base_url = "https://github.com/3arthqu4ke/HeadlessMc/releases/download"
hmc_specifics_base_url = "https://github.com/headlesshq/hmc-specifics/releases/download"
hmc_specifics_legacy_version = "2.4.0"

[security]
# Token file paths (managed by systemd LoadCredential)
client_log_token_credential = "client-log-upload-token"
rcon_password_credential = "rcon-password"

# Client upload
max_upload_mb = 25
max_installer_event_kb = 96